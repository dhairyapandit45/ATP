<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container {
            margin: auto;
            margin-top: 100px;
            display: grid;
            width: 800px;
            height: 500px;
            gap: 10px;
        }

        .child1 {
            background-color: violet;
            border-radius: 10px;
            box-shadow: 1px 1px 10px gray;
        }

        .child2 {
            background-color: burlywood;
            border-radius: 10px;
            box-shadow: 1px 1px 10px gray;
        }

        .child3 {
            background-color: beige;
            border-radius: 10px;
            box-shadow: 1px 1px 10px gray;
        }

        .child4 {
            background-color: black;
            border-radius: 10px;
            box-shadow: 1px 1px 10px gray;
        }

        .child5 {
            background-color: red;
            border-radius: 10px;
            box-shadow: 1px 1px 10px gray;
        }

        @media screen and (min-width:600px) {
            .container {
                grid-template-rows: 1fr 1fr;
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }

            .child1 {
                grid-row: 1/2;
                grid-column: 1/3;
            }

            .child2 {
                grid-row: 1/2;
                grid-column: 3/4;

            }

            .child3 {
                grid-row: 1/3;
                grid-column: 4/5;

            }

            .child4 {
                grid-row: 2/3;
                grid-column: 1/2;

            }

            .child5 {
                grid-row: 2/3;
                grid-column: 2/4;

            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="child1"></div>
        <div class="child2"></div>
        <div class="child3"></div>
        <div class="child4"></div>
        <div class="child5"></div>
    </div>
</body>

</html>
